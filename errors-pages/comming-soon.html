<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - GPL Mods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- MASTER STYLESHEET -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="container header-content">
            <a href="/index.html" class="logo">GPL <span>Mods</span></a>
        </div>
    </header>

    <main class="main-content container">
        <h1><span>Something Awesome</span> is Coming Soon</h1>
        <p>We're working hard to bring you a new and exciting feature. Stay tuned for the big reveal!</p>

        <div id="countdown">
            <div class="time-block">
                <div id="days" class="number">00</div>
                <div class="label">Days</div>
            </div>
            <div class="time-block">
                <div id="hours" class="number">00</div>
                <div class="label">Hours</div>
            </div>
            <div class="time-block">
                <div id="minutes" class="number">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="time-block">
                <div id="seconds" class="number">00</div>
                <div class="label">Seconds</div>
            </div>
        </div>

        <form class="subscription-form" id="notify-form">
            <h3>Get Notified When We Launch</h3>
            <div class="form-group">
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit">Notify Me</button>
            </div>
        </form>

        <a href="/index.html" class="home-link">Back to Homepage</a>
    </main>
    
    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2025 GPL Mods. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- MASTER JAVASCRIPT -->
    <script src="/js/script.js"></script>
</body>
</html>
